name: Build & Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" -o gradle/wrapper/gradle-wrapper.jar

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk "release/FlipperGuide-build${{ github.run_number }}.apk"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-${{ github.run_number }}
          name: FlipperGuide Build ${{ github.run_number }}
          files: "release/FlipperGuide-build${{ github.run_number }}.apk"
          body: |
            ## FlipperGuide APK
            Flipper Zero + AWOK Dual Mini v3 complete workflow guide.
            12 categories, 34+ step-by-step workflows: WiFi, Sub-GHz, RFID, NFC, BadUSB, BLE, IR, iButton, GPIO, BT RPC, Kali setup.
            Build: ${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
